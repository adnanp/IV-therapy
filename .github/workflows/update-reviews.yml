name: Monthly Clinic Data Refresh

on:
  schedule:
    - cron: '0 6 1 * *'   # 1st of every month at 06:00 UTC
  workflow_dispatch:
    inputs:
      mode:
        description: 'Fetch mode'
        required: false
        default: 'top20'
        type: choice
        options:
          - top20    # top 20 clinics only (fast)
          - all      # all clinics
          - force    # all clinics, re-fetch even if already enriched/reviewed

jobs:
  refresh-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Refresh reviews (Google Places API)
        working-directory: iv-app
        env:
          GOOGLE_PLACES_API_KEY: ${{ secrets.GOOGLE_PLACES_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'top20' }}"
          if [ "$MODE" = "all" ] || [ "$MODE" = "force" ]; then
            node scripts/fetch-reviews.mjs --all $( [ "$MODE" = "force" ] && echo "--force" )
          else
            node scripts/fetch-reviews.mjs
          fi

      - name: Enrich clinic details (Anthropic API)
        working-directory: iv-app
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          MODE="${{ github.event.inputs.mode || 'top20' }}"
          if [ "$MODE" = "all" ] || [ "$MODE" = "force" ]; then
            node scripts/enrich-clinics.mjs --all $( [ "$MODE" = "force" ] && echo "--force" )
          else
            node scripts/enrich-clinics.mjs
          fi

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iv-app/data/reviews.json iv-app/data/enriched.json
          if git diff --staged --quiet; then
            echo "No changes — skipping commit"
          else
            git commit -m "chore: monthly clinic data refresh $(date -u +%Y-%m-%d)"
            git push
          fi
