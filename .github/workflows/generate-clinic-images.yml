name: Generate Clinic Images

on:
  schedule:
    # Runs 5x per day at off-peak hours (UTC)
    - cron: '0 2 * * *'
    - cron: '0 5 * * *'
    - cron: '0 8 * * *'
    - cron: '0 11 * * *'
    - cron: '0 14 * * *'
  workflow_dispatch:  # manual trigger from GitHub UI anytime

jobs:
  generate-image:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate clinic images (5 per run)
        run: python3 generate_clinic_images.py

      - name: Commit and push if images were generated
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add iv-app/data/clinic_images.json iv-app/data/image_generation_log.json iv-app/public/clinic-images/ || true
          if git diff --staged --quiet; then
            echo "No new images generated — skipping commit"
          else
            COUNT=$(git diff --staged --name-only | grep clinic-images | wc -l)
            git commit -m "Add $COUNT AI clinic images (automated)"
            git push
          fi
